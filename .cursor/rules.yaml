title: ESP-HUB75 Development Guidelines

project:
  name: "ESP Hub75"
  type: "embedded_systems"
  primary_language: "rust"
  runtime: "embassy"
  environment: "no_std"

expertise:
  - rust
  - async_programming
  - embedded_systems
  - concurrent_systems
  - hardware_interfacing
  - real_time_systems

general_principles:
  - Write clear, concise, and idiomatic Rust code
  - Prioritize modularity, clean code organization, and efficient resource management
  - Use expressive variable names that convey intent (e.g., is_ready, has_data)
  - Adhere to Rust's naming conventions:
      - snake_case for variables and functions
      - PascalCase for types and structs
  - Avoid code duplication; use functions and modules to encapsulate reusable logic
  - Write code with safety, concurrency, and performance in mind
  - This is a no_std crate — no standard library, heap allocations, or OS primitives

code_organization:
  - Structure the crate into modules that separate peripheral drivers, ISR logic, and buffer management
  - Ensure code is well-documented with inline comments and Rustdoc
  - Follow the single responsibility principle for functions and modules

build_system:
  - Peripheral selection is handled in build.rs via esp-metadata-generated
  - build.rs emits exactly one of three custom cfg flags based on chip metadata:
      - hub75_use_parl_io (PARL_IO peripheral — ESP32-C5, ESP32-C6)
      - hub75_use_lcd_cam (LCD_CAM peripheral — ESP32-S3)
      - hub75_use_i2s_parallel (I2S parallel — ESP32)
  - Priority order: PARL_IO > LCD_CAM > I2S (ESP32-only fallback)
  - If no supported peripheral is found, build.rs panics with a compile-time error
  - Peripheral-selection cfgs (hub75_use_*) choose which driver module to compile
  - Chip-quirk cfgs are bare chip names (esp32c5, esp32c6, etc.) emitted by define_cfgs()
  - Never use feature = "esp32..." for peripheral selection — use hub75_use_* instead
  - Chip-quirk cfgs (e.g. esp32c5 for 8-bit-only PARL_IO, esp32c6 for transfer_len) use bare chip names, not feature = "chipname"

error_handling:
  - Embrace Rust's Result and Option types for error handling
  - Use ? operator to propagate errors in async functions
  - Implement custom error types for more descriptive errors
  - Handle errors and edge cases early, returning errors where appropriate

async_programming:
  - Use embassy as the async runtime for handling asynchronous tasks and I/O
  - Implement async functions using async fn syntax
  - Favor structured concurrency: prefer scoped tasks and clean cancellation paths
  - Use .await responsibly, ensuring safe points for context switching
  - Implement timeouts, retries, and backoff strategies for robust async operations
  - Use embassy_time::Timer and embassy_time::Duration for efficient time-based operations
  - Minimize async overhead; use sync code where async is not needed

performance_optimization:
  - Optimize data structures and algorithms for async use
  - Reduce contention and lock duration
  - Profile and measure performance before optimization
  - Document performance-critical sections
  - Use appropriate concurrency patterns
  - Consider power consumption in timing decisions

testing:
  - Write unit tests with embedded-test tests
  - Test individual components in isolation
  - Use descriptive test names that explain the test case
  - Follow the Arrange-Act-Assert pattern
  - Include edge cases and error scenarios
  - Keep test dependencies minimal and focused
  - Ensure tests are deterministic and repeatable

dependencies:
  - Use embassy for async runtime and task management
  - Use esp-metadata-generated (build-dependency) for chip detection and cfg emission
  - Use hub75-framebuffer for framebuffer types and BCM data layout
  - Keep dependencies up to date and minimal
  - Document external dependencies and their purposes
